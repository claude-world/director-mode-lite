name: Validate Director Mode Lite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-skills:
    name: Validate SKILL.md Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Skills Format
        run: |
          echo "Validating SKILL.md files against Agent Skills spec..."

          ERRORS=0

          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            skill_file="$skill_dir/SKILL.md"

            echo ""
            echo "---"
            echo "Checking: $skill_name"

            # Check SKILL.md exists
            if [[ ! -f "$skill_file" ]]; then
              echo "  FAIL: SKILL.md not found"
              ERRORS=$((ERRORS + 1))
              continue
            fi

            # Extract ONLY the first frontmatter block (not example yaml blocks)
            # Uses awk to stop after first closing ---
            frontmatter=$(awk 'NR==1 && /^---$/{p=1;next} p && /^---$/{exit} p' "$skill_file")

            # Check required 'name' field
            name_value=$(echo "$frontmatter" | grep -E "^name:" | sed 's/name: *//')
            if [[ -z "$name_value" ]]; then
              echo "  FAIL: Missing required 'name' field"
              ERRORS=$((ERRORS + 1))
            else
              # Validate name format (lowercase, hyphens, numbers only)
              if [[ ! "$name_value" =~ ^[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
                echo "  FAIL: Invalid name format: '$name_value' (must be lowercase letters, numbers, hyphens)"
                ERRORS=$((ERRORS + 1))
              elif [[ "$name_value" != "$skill_name" ]]; then
                echo "  FAIL: Name mismatch: '$name_value' vs directory '$skill_name'"
                ERRORS=$((ERRORS + 1))
              elif [[ ${#name_value} -gt 64 ]]; then
                echo "  FAIL: Name too long: ${#name_value} chars (max 64)"
                ERRORS=$((ERRORS + 1))
              else
                echo "  PASS: name: $name_value"
              fi
            fi

            # Check required 'description' field
            description_value=$(echo "$frontmatter" | grep -E "^description:" | sed 's/description: *//')
            if [[ -z "$description_value" ]]; then
              echo "  FAIL: Missing required 'description' field"
              ERRORS=$((ERRORS + 1))
            elif [[ ${#description_value} -gt 1024 ]]; then
              echo "  FAIL: Description too long: ${#description_value} chars (max 1024)"
              ERRORS=$((ERRORS + 1))
            elif [[ ${#description_value} -lt 20 ]]; then
              echo "  WARN: Description too short (recommend 20+ chars)"
            else
              echo "  PASS: description: ${description_value:0:50}..."
            fi

            # Check file length
            line_count=$(wc -l < "$skill_file" | tr -d ' ')
            if [[ $line_count -gt 500 ]]; then
              echo "  WARN: SKILL.md is $line_count lines (recommend <500)"
            else
              echo "  PASS: Length: $line_count lines"
            fi

          done

          echo ""
          echo "---"
          if [[ $ERRORS -gt 0 ]]; then
            echo "FAIL: Validation failed with $ERRORS error(s)"
            exit 1
          else
            echo "PASS: All skills validated successfully!"
          fi

  validate-agents:
    name: Validate Agent Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Agent Format
        run: |
          echo "Validating agent files..."

          ERRORS=0
          VALID_COLORS="yellow red green blue magenta cyan"
          VALID_MODELS="inherit haiku sonnet opus best"

          for agent_file in agents/*.md; do
            if [[ ! -f "$agent_file" ]]; then
              continue
            fi

            filename=$(basename "$agent_file")
            echo ""
            echo "---"
            echo "Checking: $filename"

            # Check file is not empty
            if [[ ! -s "$agent_file" ]]; then
              echo "  FAIL: Empty file"
              ERRORS=$((ERRORS + 1))
              continue
            fi

            # Check for frontmatter
            if ! head -1 "$agent_file" | grep -q "^---$"; then
              echo "  FAIL: Missing frontmatter"
              ERRORS=$((ERRORS + 1))
              continue
            fi

            # Extract frontmatter
            frontmatter=$(awk 'NR==1 && /^---$/{p=1;next} p && /^---$/{exit} p' "$agent_file")

            # Check required 'name' field
            name_value=$(echo "$frontmatter" | grep -E "^name:" | sed 's/name: *//')
            if [[ -z "$name_value" ]]; then
              echo "  FAIL: Missing required 'name' field"
              ERRORS=$((ERRORS + 1))
            else
              echo "  PASS: name: $name_value"
            fi

            # Check required 'description' field
            description_value=$(echo "$frontmatter" | grep -E "^description:" | sed 's/description: *//')
            if [[ -z "$description_value" ]]; then
              echo "  FAIL: Missing required 'description' field"
              ERRORS=$((ERRORS + 1))
            else
              echo "  PASS: description present"
            fi

            # Check required 'color' field
            color_value=$(echo "$frontmatter" | grep -E "^color:" | sed 's/color: *//')
            if [[ -z "$color_value" ]]; then
              echo "  FAIL: Missing required 'color' field"
              ERRORS=$((ERRORS + 1))
            elif [[ ! " $VALID_COLORS " =~ " $color_value " ]]; then
              echo "  FAIL: Invalid color: '$color_value' (valid: $VALID_COLORS)"
              ERRORS=$((ERRORS + 1))
            else
              echo "  PASS: color: $color_value"
            fi

            # Check required 'model' field
            model_value=$(echo "$frontmatter" | grep -E "^model:" | sed 's/model: *//')
            if [[ -z "$model_value" ]]; then
              echo "  FAIL: Missing required 'model' field"
              ERRORS=$((ERRORS + 1))
            else
              # Check base model name (strip [1m] suffix for validation)
              base_model=$(echo "$model_value" | sed 's/\[1m\]$//')
              if [[ ! " $VALID_MODELS " =~ " $base_model " ]] && [[ "$model_value" != "opusplan" ]]; then
                echo "  FAIL: Invalid model: '$model_value'"
                ERRORS=$((ERRORS + 1))
              else
                echo "  PASS: model: $model_value"
              fi
            fi

            # Check tools uses YAML list format (not bracket array)
            if echo "$frontmatter" | grep -qE "^tools:.*\["; then
              echo "  FAIL: tools must use YAML list format, not bracket array"
              ERRORS=$((ERRORS + 1))
            elif echo "$frontmatter" | grep -q "^tools:"; then
              echo "  PASS: tools field present (YAML list)"
            fi

            # Check markdown heading exists after frontmatter
            if ! grep -q "^# " "$agent_file"; then
              echo "  WARN: Missing '# Agent Name' heading"
            fi

          done

          echo ""
          echo "---"
          if [[ $ERRORS -gt 0 ]]; then
            echo "FAIL: Agent validation failed with $ERRORS error(s)"
            exit 1
          else
            echo "PASS: All agents validated!"
          fi

  check-links:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check README Links
        run: |
          echo "Checking links in README.md..."

          ERRORS=0

          # Extract markdown links
          links=$(grep -oE '\[([^]]+)\]\(([^)]+)\)' README.md | grep -oE '\(([^)]+)\)' | tr -d '()')

          for link in $links; do
            # Skip external links for now, just check internal
            if [[ "$link" =~ ^https?:// ]]; then
              echo "  EXT: $link (skipped)"
            elif [[ "$link" =~ ^# ]]; then
              echo "  ANCHOR: $link (skipped)"
            else
              if [[ ! -e "$link" ]]; then
                echo "  FAIL: Broken internal link: $link"
                ERRORS=$((ERRORS + 1))
              else
                echo "  PASS: $link"
              fi
            fi
          done

          echo ""
          if [[ $ERRORS -gt 0 ]]; then
            echo "FAIL: Found $ERRORS broken link(s)"
            exit 1
          else
            echo "PASS: All internal links valid!"
          fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for Sensitive Data
        run: |
          echo "Scanning for sensitive data..."

          ERRORS=0

          # Check for common secrets patterns
          patterns=(
            "sk-[a-zA-Z0-9]{48}"          # OpenAI API key
            "AKIA[0-9A-Z]{16}"            # AWS Access Key
            "ghp_[a-zA-Z0-9]{36}"         # GitHub PAT
            "xox[baprs]-[a-zA-Z0-9-]+"    # Slack token
            "-----BEGIN.*PRIVATE KEY-----"
          )

          for pattern in "${patterns[@]}"; do
            if grep -rE "$pattern" --include="*.md" --include="*.sh" --include="*.json" . 2>/dev/null; then
              echo "FAIL: Potential secret found matching: $pattern"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # Check for hardcoded paths
          if grep -rE "/Users/|/home/[^/]+/" --include="*.md" --include="*.sh" . 2>/dev/null | grep -v "example" | grep -v "#"; then
            echo "WARN: Potential hardcoded user paths found"
          fi

          echo ""
          if [[ $ERRORS -gt 0 ]]; then
            echo "FAIL: Security scan found $ERRORS issue(s)"
            exit 1
          else
            echo "PASS: No sensitive data detected!"
          fi

  install-test:
    name: Test Installation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test Install Script
        run: |
          echo "Testing installation..."

          # Create temp directory
          mkdir -p /tmp/test-project

          # Run install
          ./install.sh /tmp/test-project

          # Verify installation
          echo ""
          echo "Checking installed files..."

          ERRORS=0

          # Check agents
          if [[ ! -d "/tmp/test-project/.claude/agents" ]]; then
            echo "FAIL: Agents not installed"
            ERRORS=$((ERRORS + 1))
          else
            agent_count=$(ls /tmp/test-project/.claude/agents/*.md 2>/dev/null | wc -l)
            echo "PASS: Agents installed: $agent_count files"
          fi

          # Check skills
          if [[ ! -d "/tmp/test-project/.claude/skills" ]]; then
            echo "FAIL: Skills not installed"
            ERRORS=$((ERRORS + 1))
          else
            skill_count=$(ls -d /tmp/test-project/.claude/skills/*/ 2>/dev/null | wc -l)
            echo "PASS: Skills installed: $skill_count directories"
          fi

          # Check hooks
          if [[ ! -d "/tmp/test-project/.claude/hooks" ]]; then
            echo "WARN: hooks directory not found"
          else
            hook_count=$(ls /tmp/test-project/.claude/hooks/*.sh 2>/dev/null | wc -l)
            echo "PASS: Hooks installed: $hook_count scripts"
          fi

          echo ""
          if [[ $ERRORS -gt 0 ]]; then
            echo "FAIL: Installation test failed with $ERRORS error(s)"
            exit 1
          else
            echo "PASS: Installation test passed!"
          fi

      - name: Test Uninstall Script
        run: |
          echo "Testing uninstall (hooks only)..."

          # Run uninstall with option 1 (hooks only)
          echo "1" | ./uninstall.sh /tmp/test-project

          # Verify hooks removed but content kept
          if [[ -d "/tmp/test-project/.claude/skills" ]]; then
            echo "PASS: Skills preserved"
          else
            echo "FAIL: Skills should be preserved"
            exit 1
          fi

          echo "PASS: Uninstall test passed!"
